# MySQL Production Profile Configuration
spring.datasource.url=jdbc:mysql://mysql:3306/lifelinkdb?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root1234

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Disable H2 in Production
spring.h2.console.enabled=false

# Google Gemini API configuration
gemini.api.key=${GEMINI_API_KEY:AIzaSyPlaceholderKeyForLifeLinkBloodNetworkSystem}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent

# Twilio configuration
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.from.number=${TWILIO_FROM_NUMBER:}

# Firebase configuration
firebase.service.account.path=${FIREBASE_SERVICE_ACCOUNT_PATH:}
