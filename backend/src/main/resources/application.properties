# Spring Boot Core Configuration
spring.application.name=lifelink-backend
server.port=8082

# JPA configuration
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# DEV PROFILE: IN-MEMORY H2 DATABASE
# ==========================================
spring.datasource.url=jdbc:h2:mem:lifelinkdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Google Gemini API configuration
gemini.api.key=AIzaSyPlaceholderKeyForLifeLinkBloodNetworkSystem
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent
# Twilio configuration (environment variables TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN, TWILIO_FROM_NUMBER)
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
  twilio.auth.token=${TWILIO_AUTH_TOKEN:}
  twilio.from.number=${TWILIO_FROM_NUMBER:}
# Firebase configuration (environment variable FIREBASE_SERVICE_ACCOUNT_PATH)
firebase.service.account.path=${FIREBASE_SERVICE_ACCOUNT_PATH:}
