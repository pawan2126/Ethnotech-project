version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: lifelink-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: lifelinkdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root1234
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - lifelink-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lifelink-backend
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/lifelinkdb
      - DATABASE_URL=jdbc:postgresql://postgres:5432/lifelinkdb
      - DATABASE_DRIVER=org.postgresql.Driver
      - DATABASE_DIALECT=org.hibernate.dialect.PostgreSQLDialect
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=root1234
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER:-}
      - FIREBASE_SERVICE_ACCOUNT_PATH=${FIREBASE_SERVICE_ACCOUNT_PATH:-}
    depends_on:
      - postgres
    networks:
      - lifelink-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lifelink-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - lifelink-net

volumes:
  db-data:

networks:
  lifelink-net:
    driver: bridge
