version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: lifelink-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: lifelinkdb
      MYSQL_ROOT_PASSWORD: root1234
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - lifelink-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lifelink-backend
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/lifelinkdb?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root1234
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER:-}
      - FIREBASE_SERVICE_ACCOUNT_PATH=${FIREBASE_SERVICE_ACCOUNT_PATH:-}
    depends_on:
      - mysql
    networks:
      - lifelink-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lifelink-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - lifelink-net

volumes:
  db-data:

networks:
  lifelink-net:
    driver: bridge
